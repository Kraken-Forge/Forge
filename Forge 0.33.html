window.addEventListener('unhandledrejection', function(e) {
  try {
    const el = document.createElement('div');
    el.style.position = 'fixed';
    el.style.top = '0';
    el.style.left = '0';
    el.style.right = '0';
    el.style.zIndex = '99999';
    el.style.background = '#3a0a0a';
    el.style.color = '#ffb3b3';
    el.style.fontFamily = 'monospace';
    el.style.fontSize = '11px';
    el.style.padding = '10px';
    el.style.whiteSpace = 'pre-wrap';
    el.style.maxHeight = '40vh';
    el.style.overflowY = 'auto';
    const reason = e.reason;
    el.textContent = 'UNHANDLED PROMISE REJECTION: ' +
      (reason && reason.message ? reason.message : String(reason)) +
      (reason && reason.code ? '\\nCode: ' + reason.code : '') +
      (reason && reason.stack ? '\\n' + reason.stack : '');
    document.body.appendChild(el);
  } catch (ignored) {}
});
window.addEventListener('error', function(e) {
  try {
    const el = document.createElement('div');
    el.style.position = 'fixed';
    el.style.top = '0';
    el.style.left = '0';
    el.style.right = '0';

    el.style.whiteSpace = 'pre-wrap';

      '\nFile: ' + (e.filename || '?') + ':' + (e.lineno || '?') +

    document.body.appendChild(el);
  } catch (ignored) {}
});
// ===================== XP / LEVEL MATH (RuneScape-style curve) =====================
function xpForLevel(level) {
  let points = 0;
  for (let n = 1; n < level; n++) points += Math.floor(n + 300 * Math.pow(2, n / 7));
  const raw = Math.floor(points / 4);
  const raw99 = 13034431; // raw XP for level 99, precomputed constant
  const target99 = 43820; // ~2.7 years at typical weekly pace
  if (raw === 0) return 0;
  return Math.round(target99 * Math.pow(raw / raw99, 0.5));
}
const LEVEL_TABLE = (() => {
  const t = [0];
  for (let lvl = 1; lvl <= 99; lvl++) t.push(xpForLevel(lvl + 1));
  return t;
})();
function getLevel(xp) {
  let lvl = 1;
  for (let i = 1; i <= 99; i++) { if (xp >= LEVEL_TABLE[i]) lvl = i + 1; else break; }
  return Math.min(lvl, 99);
}
function xpProgress(xp) {
  const level = getLevel(xp);
  if (level >= 99) return { level, pct: 100 };
  const floor = LEVEL_TABLE[level - 1], ceil = LEVEL_TABLE[level];
  return { level, pct: ((xp - floor) / (ceil - floor)) * 100 };
}
function xpForExercise(ex) {
  if (ex.diff === 0) return 0;
  const base = ex.unit === 'sec' ? ex.reps * 0.8 : ex.reps * 1.6;
  return Math.round(base * ex.diff);
}

// Flattened [name, diff] list for difficulty lookups, and a name->skill map
// for coloring/icon-tagging suggestions by body part.
const EXERCISE_LIBRARY = [];
const EXERCISE_LIBRARY_SKILL_MAP = {};
Object.entries(EXERCISE_LIBRARY_BY_SKILL).forEach(([skill, list]) => {
  list.forEach(([name, diff]) => {
    EXERCISE_LIBRARY.push([name, diff]);
    EXERCISE_LIBRARY_SKILL_MAP[name] = skill;
  });
});

function lookupExerciseLibrary(name) {
  const n = name.trim().toLowerCase();
  if (!n) return null;
  const exact = EXERCISE_LIBRARY.find(([libName]) => libName.toLowerCase() === n);
  return exact ? exact[1] : null;
}

function exerciseLibrarySuggestions(query, limit, scopeToSkill) {
  limit = limit || 6;
  const q = query.trim().toLowerCase();
  if (!q) return [];
  let pool = EXERCISE_LIBRARY;
  if (scopeToSkill) {
    pool = EXERCISE_LIBRARY_BY_SKILL[scopeToSkill] || [];
  }
  return pool
    .filter(([name]) => name.toLowerCase().includes(q))
    .sort((a, b) => a[0].toLowerCase().indexOf(q) - b[0].toLowerCase().indexOf(q))
    .slice(0, limit);
}

// Estimates a difficulty score (1.5-6, matching the real library's range)
// for a custom, user-typed exercise name using keyword pattern matching.
// Not a lookup table of every possible exercise — a set of modifiers that
// nudge a baseline score up or down based on words that tend to signal
// harder or easier variations, calibrated against the existing library.
function estimateCustomDifficulty(name) {
  const n = name.toLowerCase();
  let score = 3; // baseline: average difficulty, matches most "standard" moves

  const hardWords = [
    ['diamond', 1.8], ['decline', 1], ['explosive', 2], ['clap', 2.5],
    ['single-leg', 1.5], ['single arm', 1.5], ['one-arm', 2],
    ['one arm', 2], ['one-leg', 1.5], ['pistol', 2], ['archer', 1.8],
    ['jumping', 1], ['jump', 1.2], ['plyo', 1.5], ['handstand', 2.5],
    ['burpee', 1.5], ['weighted', 1], ['negative', 0.8], ['slow', 0.5],
    ['pause', 0.4], ['elevated', 0.6], ['advanced', 1.2], ['deficit', 1],
  ];
  const easyWords = [
    ['incline', -1], ['wall', -1.3], ['assisted', -1.5], ['knee', -1.2],
    ['modified', -1], ['beginner', -1.5], ['seated', -0.8], ['supported', -1],
    ['half', -0.6], ['easy', -1.5], ['light', -0.8], ['gentle', -1.2],
    ['stretch', -1.5], ['hold', -0.3], ['static', -0.3],
  ];

  for (const [word, mod] of hardWords) if (n.includes(word)) score += mod;
  for (const [word, mod] of easyWords) if (n.includes(word)) score += mod;

  // clamp to the library's real range and snap to the nearest 0.5 step
  score = Math.max(1.5, Math.min(6, score));
  return Math.round(score * 2) / 2;
}

function renderConstellationMap(xpData, sideXp) {
  const allXp = { ...xpData, ...sideXp };
  const maxed = capeIsMaxed(xpData, sideXp);

  // 4 columns x 2 rows grid, each cell 70x70
  const CELL = 70;
  const COLS = 4;
  const gridOrder = ['CHEST','BACK','SHOULDERS','ABS','LEGS','ARMS','CARDIO','FULLBODY'];
  const W = CELL * COLS;
  const H = CELL * 2;

  let svg = `<svg width="100%" height="auto" viewBox="0 0 ${W} ${H}" style="display:block;max-width:320px;">
    <defs>
      <radialGradient id="skyGrad" cx="50%" cy="30%" r="95%">
        <stop offset="0%" stop-color="${maxed ? '#181206' : '#10111c'}" />
        <stop offset="100%" stop-color="${maxed ? '#0c0904' : '#050509'}" />
      </radialGradient>
      <radialGradient id="nebA" cx="50%" cy="50%" r="50%"><stop offset="0%" stop-color="#e860b0" stop-opacity="0.12" /><stop offset="100%" stop-color="#e860b0" stop-opacity="0" /></radialGradient>
      <radialGradient id="nebB" cx="50%" cy="50%" r="50%"><stop offset="0%" stop-color="#3fd9d0" stop-opacity="0.11" /><stop offset="100%" stop-color="#3fd9d0" stop-opacity="0" /></radialGradient>
    </defs>
    <rect x="0" y="0" width="${W}" height="${H}" fill="url(#skyGrad)" />`;

  svg += `<ellipse cx="${W*0.25}" cy="${H*0.3}" rx="${W*0.3}" ry="${H*0.5}" fill="url(#nebA)" />`;
  svg += `<ellipse cx="${W*0.75}" cy="${H*0.7}" rx="${W*0.3}" ry="${H*0.5}" fill="url(#nebB)" />`;

  // sparse scattered background micro-stars, scaled to the smaller canvas
  const bgSeed = [5,8,18,15,32,6,48,18,62,9,8,32,25,38,40,30,55,40,70,35,12,55,28,58,
    42,50,58,55,72,48,18,62,35,65,50,60,65,68,8,68,22,68];
  for (let i = 0; i < bgSeed.length; i += 2) {
    const x = bgSeed[i] * (W / 75);
    const y = bgSeed[i+1] * (H / 70);
    svg += `<circle cx="${x.toFixed(1)}" cy="${Math.min(y,H-2).toFixed(1)}" r="0.6" fill="#aab8ff" opacity="0.4" />`;
  }

  gridOrder.forEach((skill, gridIdx) => {
    const con = CONSTELLATIONS[skill];
    const col = gridIdx % COLS;
    const row = Math.floor(gridIdx / COLS);
    const offX = col * CELL;
    const offY = row * CELL;

    const xp = allXp[skill] || 0;
    const level = getLevel(xp);
    const total = con.stars.length;
    const litCount = level > 0 ? Math.min(total, Math.max(1, Math.round((level / 99) * total))) : 0;
    const color = CONSTELLATION_AURORA[skill];

    // subtle cell divider, very faint, just to suggest grid structure
    if (col > 0) svg += `<line x1="${offX}" y1="${offY+4}" x2="${offX}" y2="${offY+CELL-4}" stroke="#1c1d2c" stroke-width="0.5" opacity="0.5" />`;

    let segStart = null;
    con.chain.forEach((idx) => {
      if (idx === null) { segStart = null; return; }
      if (segStart !== null) {
        const bothLit = segStart < litCount && idx < litCount;
        const [x1,y1] = con.stars[segStart];
        const [x2,y2] = con.stars[idx];
        svg += `<line x1="${x1+offX}" y1="${y1+offY}" x2="${x2+offX}" y2="${y2+offY}"
          stroke="${bothLit ? color : '#6a6d7e'}" stroke-width="${bothLit ? 0.9 : 0.55}" opacity="${bothLit ? 0.6 : 0.4}" />`;
      }
      segStart = idx;
    });

    con.stars.forEach(([x,y], i) => {
      const isLit = i < litCount;
      const cx = x + offX, cy = y + offY;
      if (isLit) {
        // colored fill with a soft bloom, white outline still visible underneath
        svg += `<circle cx="${cx}" cy="${cy}" r="2.1" fill="${color}" stroke="#f2f2f5" stroke-width="0.4" class="star-anim" style="filter:drop-shadow(0 0 4px ${color}) drop-shadow(0 0 7px ${color}88);" />`;
      } else {
        // unlit: clean white outline only, no fill, so the constellation shape always reads clearly
        svg += `<circle cx="${cx}" cy="${cy}" r="1.6" fill="none" stroke="#e8e8ee" stroke-width="0.7" opacity="0.65" />`;
      }
    });
  });

  svg += `</svg>`;
  return svg;
}

// Side Quests dynamically show the 4 LEAST-trained skills (by total XP)
// of all 8 — recalculated live as XP changes, no fixed rotation anymore.
// Side Quests show every skill NOT covered by the current main week,
// guaranteeing full coverage of all 8 skills between the two areas. This
// list is computed once and stored in state — it stays fixed all week and
// only recalculates when End Week runs, so it doesn't reshuffle mid-session
// every time you earn XP. Sorted highest-to-lowest XP among the missing skills.
// True only when every single skill still sits at 0 XP — meaning the person
// is still actively setting up their week for the first time, not training
// yet. In this state only, Side Quests recalculate live on every day-swap
// or exercise edit, since freezing a stale pre-setup snapshot would be
// wonky. The moment any real XP exists anywhere, freezing resumes normally.
function allSkillsAtZero() {
  const allXp = { ...state.xpData, ...state.sideXp };
  return Object.values(allXp).every(xp => (xp || 0) === 0);
}

function recalculateSideQuestSkills() {
  const coveredThisWeek = new Set();
  (state.myWeek || []).forEach(day => {
    if (day.skill && day.skill !== 'REST') coveredThisWeek.add(day.skill);
    day.exercises.forEach(ex => { if (ex.skill) coveredThisWeek.add(ex.skill); });
  });
  const ALL_SKILLS = ['CHEST','BACK','SHOULDERS','ABS','LEGS','ARMS','CARDIO','FULLBODY'];
  const allXp = { ...state.xpData, ...state.sideXp };
  const missing = ALL_SKILLS.filter(sk => !coveredThisWeek.has(sk));
  missing.sort((a, b) => (allXp[b] || 0) - (allXp[a] || 0)); // highest to lowest XP
  state.sideQuestSkills = missing;
}

function currentSideQuests() {
  if (!state.myWeek) currentWorkouts(); // ensure the week is seeded first
  if (!state.sideQuestSkills) recalculateSideQuestSkills();
  const result = {};
  state.sideQuestSkills.forEach(skillKey => {
    const exercises = allExercisesForSkill(skillKey).slice(0, 5);
    result[skillKey] = {
      label: skillKey === 'FULLBODY' ? 'Full Body / Other' : skillKey.charAt(0) + skillKey.slice(1).toLowerCase(),
      exercises: exercises.map(ex => ({ ...ex, skill: skillKey })),
    };
  });
  return result;
}

// Collects every exercise for a given skill across ALL 4 main rotations and
// ALL 4 side quest rotations, deduplicated by name, for the exercise picker.
function allExercisesForSkill(skillKey) {
  const seen = new Set();
  const result = [];
  WORKOUT_ROTATIONS.forEach(rotation => {
    rotation.forEach(day => {
      day.exercises.forEach(ex => {
        const exSkill = ex.skill || day.skill;
        if (exSkill === skillKey && !seen.has(ex.name)) {
          seen.add(ex.name);
          result.push(ex);
        }
      });
    });
  });
  SIDE_QUEST_ROTATIONS.forEach(rotation => {
    const quest = rotation[skillKey];
    if (quest) {
      quest.exercises.forEach(ex => {
        if (!seen.has(ex.name)) {
          seen.add(ex.name);
          result.push(ex);
        }
      });
    }
  });
  return result;
}

// One-time repair: an earlier bug let main-pool skills (Chest/Back/Abs/
// Shoulders) get a phantom entry created in sideXp whenever that skill
// showed up in Side Quests for being under-trained that week. Once created,
// that phantom key permanently fooled the old "in sideXp" check into
// routing ALL future XP for that skill into the wrong pool. This merges
// any such phantom values back into xpData where they actually belong.
function repairMisplacedSkillXp() {
  if (!state.sideXp || typeof state.sideXp !== 'object') state.sideXp = { LEGS:0, ARMS:0, CARDIO:0, FULLBODY:0 };
  if (!state.xpData || typeof state.xpData !== 'object') state.xpData = { CHEST:0, BACK:0, ABS:0, SHOULDERS:0 };
  let repaired = false;
  for (const skill of Object.keys(state.sideXp)) {
    if (MAIN_POOL_SKILLS.has(skill)) {
      const misplaced = state.sideXp[skill] || 0;
      if (misplaced > 0) {
        state.xpData[skill] = (state.xpData[skill] || 0) + misplaced;
        repaired = true;
      }
      delete state.sideXp[skill];
      repaired = true;
    }
  }
  return repaired;
}

function tryLocalRestore() {
  try {
    const raw = localStorage.getItem('forge-state');
    if (raw) {
      const parsed = JSON.parse(raw);
      state = Object.assign(state, parsed);
      // Reversal: an earlier version briefly scaled XP up 320x to stretch the
      // timeline to 99. That's reverted now (curve shrunk instead), so undo
      // that scale-up for anyone who has it, back to normal small numbers.
      if (parsed.xpFormulaV2) {
        const SCALE = 320;
        for (const k of Object.keys(state.xpData)) state.xpData[k] = Math.round((state.xpData[k] || 0) / SCALE);
        for (const k of Object.keys(state.sideXp)) state.sideXp[k] = Math.round((state.sideXp[k] || 0) / SCALE);
        delete state.xpFormulaV2;
        persist();
      }
      if (repairMisplacedSkillXp()) persist();
    }
  } catch (e) {}
}

function toggleMain(day, idx, ex) {
  const key = day + '-' + idx;
  const wasDone = !!state.completed[key];
  state.completed[key] = !wasDone;
  const w = currentWorkouts().find(w => w.day === day);
  const skillKey = ex.skill || w.skill;
  if (skillKey !== 'REST') {
    const gained = xpForExercise(ex);
    const prevXp = state.xpData[skillKey] || 0;
    const prevLevel = getLevel(prevXp);
    if (!wasDone) {
      state.xpData[skillKey] = prevXp + gained;
      const newLevel = getLevel(state.xpData[skillKey]);
      showPopup('+' + gained + ' ' + skillKey + ' XP', SKILL_COLOR[skillKey]);
      if (newLevel > prevLevel) showLevelFlash(skillKey, newLevel);
    } else {
      state.xpData[skillKey] = Math.max(0, prevXp - gained);
    }
  }
  persist();
}

    pool[skillKey] = prevXp + gained;
    const newLevel = getLevel(pool[skillKey]);
    showPopup('+' + gained + ' ' + skillLabel + ' XP', SKILL_COLOR[skillKey]);
    if (newLevel > prevLevel) showLevelFlash(skillLabel, newLevel);
  } else {
    pool[skillKey] = Math.max(0, prevXp - gained);
  }
  persist();
}

function dayProgress(day, exCount) {
  let done = 0;
  for (let i = 0; i < exCount; i++) if (state.completed[day + '-' + i]) done++;
  return done;
}

function todayDateString() {
  const d = new Date();
  return d.getFullYear() + '-' + (d.getMonth()+1) + '-' + d.getDate();
}

function confirmEndWeek() {
  state.completed = {};
  state.sideCompleted = {};
  state.lastEndWeekDate = todayDateString();
  recalculateSideQuestSkills();
  pendingModal = null;
  persist();
  showPopup('WEEK CASHED IN — XP BANKED', '#f2c14e');
}

function confirmResetAll() {
  state = {
    completed: {},
    xpData: { CHEST:0, BACK:0, ABS:0, SHOULDERS:0 },
    sideCompleted: {},
    sideXp: { LEGS:0, ARMS:0, CARDIO:0, FULLBODY:0 },
    myWeek: null,
    restDay: 7,
    sideQuestSkills: null,
    profile: { name: '', color: '#c4451c', icon: 'FLAME' },
    lastEndWeekDate: null,
  };
  pendingModal = null;
  persist();
}

function esc(s) { return String(s); }

function renderSkillBar(key, xp, label) {
  const prog = xpProgress(xp || 0);

  const icon = skillIconSvg(key, color, 16);
  return `
    <div class="skillrow" onclick="window.__forge.openExercisePicker('${key}')" style="cursor:pointer;">

function renderExRow(key, ex, isDone, exColor, onclickAttr, editAttr) {
  const xpVal = xpForExercise(ex);

    const listHtml = exercises.map((ex, i) => `
      <div class="exrow" onclick="window.__forge.selectPickerExercise(${i})"
        style="cursor:pointer;background:${(sel && sel.name === ex.name) ? color+'15' : 'transparent'};border:1px solid ${(sel && sel.name === ex.name) ? color : '#232629'};border-radius:6px;margin-bottom:4px;">
        <div class="exname" style="flex:1;">${esc(ex.name)}</div>
        <div class="exreps">${ex.unit === 'sec' ? ex.reps + ' sec' : ex.reps + ' rep'}</div>
      </div>`).join('');

    app.innerHTML += `
      <div class="modal-overlay">
        <div class="modal" style="border:1px solid ${color};max-height:85vh;display:flex;flex-direction:column;">
          <div class="mtitle" style="color:${color};">${isSlotEdit ? 'REPLACE THIS EXERCISE' : skillKey + ' EXERCISES'}</div>
          <div class="mbody" style="margin-bottom:10px;">${isSlotEdit ? 'Pick a permanent replacement for this exercise slot, or add your own.' : 'Pick one for a quick one-time XP log, or add your own.'}</div>
          <div style="overflow-y:auto;flex:1;margin-bottom:12px;max-height:240px;">
            ${listHtml}
            <div class="exrow" onclick="window.__forge.selectPickerCustom()"
              style="cursor:pointer;background:${isCustom ? color+'15' : 'transparent'};border:1px solid ${isCustom ? color : '#3a5ac4'};border-radius:6px;margin-top:6px;">
              <div class="exname" style="flex:1;color:#6fd8ff;">+ Custom Exercise</div>
            </div>
          </div>
          ${isCustom ? `
            <input id="picker-custom-name" type="text" maxlength="40" placeholder="e.g. Pike push-ups"
              value="${esc(exercisePickerCustomName)}" oninput="window.__forge.updatePickerCustomName(this.value)"
              autocomplete="off"
              style="width:100%;padding:10px 12px;border-radius:6px;border:1px solid #3a3d42;background:#0d0e10;color:#e8e6e1;font-family:inherit;font-size:14px;margin-bottom:6px;box-sizing:border-box;" />
            ${suggestions.length ? `
              <div style="display:flex;flex-wrap:wrap;gap:6px;margin-bottom:8px;">
                ${suggestions.map(([sName]) => `<button onclick="window.__forge.pickSuggestion('${sName.replace(/'/g, "\\'")}')"
                  style="font-size:11px;padding:5px 9px;border-radius:5px;border:1.5px solid ${color};background:${color}2a;color:${color};cursor:pointer;font-family:inherit;box-shadow:0 0 6px ${color}55;">
                  ${esc(sName)}
                </button>`).join('')}
              </div>
            ` : ''}
            <div style="font-size:10px;color:#52555a;margin-bottom:10px;">
              ${exercisePickerCustomName.trim()
                ? (previewFromLibrary
                    ? `Difficulty: ${previewDiff} / 6 (matched in our exercise library)`
                    : `Estimated difficulty: ${previewDiff} / 6 (guessed from the name — not in our library yet)`)
                : "Type any exercise — we'll match it or estimate a fair difficulty automatically."}
            </div>
          ` : ''}
          ${sel ? `
            <div style="display:flex;align-items:center;gap:10px;margin-bottom:14px;">
              <label style="font-size:12px;color:#8a8f98;white-space:nowrap;">Amount (${previewUnit === 'sec' ? 'sec' : 'reps'}):</label>
              <input id="${amountInputId}" type="number" min="1" max="500" value="${previewAmount}"
                oninput="window.__forge.updatePickerPreview()"
                style="width:90px;padding:8px 10px;border-radius:6px;border:1px solid #3a3d42;background:#0d0e10;color:#e8e6e1;font-family:inherit;font-size:14px;box-sizing:border-box;" />
              <span id="picker-xp-preview" style="font-size:13px;font-weight:800;color:${color};margin-left:auto;">+${xpForExercise({reps:previewAmount,unit:previewUnit,diff:previewDiff})} xp</span>
            </div>
          ` : ''}
          <div class="mrow">
            <button class="cancel" onclick="window.__forge.closeModal()">CANCEL</button>
            <button class="confirm-green" onclick="${isSlotEdit ? 'window.__forge.confirmSlotEdit()' : 'window.__forge.confirmPickerLog()'}" ${(!sel || (isCustom && !exercisePickerCustomName.trim())) ? 'disabled style="opacity:0.4;"' : ''}>${isSlotEdit ? 'SAVE SLOT' : 'LOG XP'}</button>
          </div>
        </div>
      </div>`;
  } else if (pendingModal === 'loadkey') {
    app.innerHTML += `
      <div class="modal-overlay">
        <div class="modal" style="border:1px solid #2a2d31;">
          <div class="mtitle">LOAD A DIFFERENT KEY</div>
          <div class="mbody">Type your sync key to load that profile on this device. This overwrites your current local progress with whatever's saved under that key.</div>
          <input id="load-key-input" type="text" maxlength="40" placeholder="e.g. RedWolf42"
            style="width:100%;padding:10px 12px;border-radius:6px;border:1px solid #3a3d42;background:#0d0e10;color:#e8e6e1;font-family:inherit;font-size:14px;margin-bottom:14px;box-sizing:border-box;" />
          <div class="mrow">
            <button class="cancel" onclick="window.__forge.closeModal()">CANCEL</button>
            <button class="confirm-green" onclick="window.__forge.confirmLoadKey()">LOAD</button>
          </div>
        </div>
      </div>`;
  } else if (pendingModal === 'reset') {
    app.innerHTML += `
      <div class="modal-overlay">
        <div class="modal danger">
          <div class="mtitle">RESET EVERYTHING?</div>
          <div class="mbody">This wipes every skill back to Level 1 — Chest, Back, Shoulders, Abs, and all Side Quest skills. Today's checklist clears too.</div>
          <div class="mwarn">This can't be undone.</div>
          <div class="mrow">
            <button class="cancel" onclick="window.__forge.closeModal()">CANCEL</button>
            <button class="confirm-red" onclick="window.__forge.confirmReset()">YES, RESET ALL</button>
          </div>
        </div>
      </div>`;
  }

  if (showProfileModal) {
    const dp = draftProfile || state.profile;
    const icons = ['FLAME','BOLT','SKULL','CROWN','WOLF','EAGLE','DRAGON','STAR','GEM','TARGET','MOUNTAIN','SKULLCROSS'];
    const colors = ['#c4451c','#3a7d8c','#b08c2a','#5a8c3a','#9a4a8c','#c43a5a','#3a5ac4','#e8b923','#4ea876','#8a8f98'];
    app.innerHTML += `
      <div class="modal-overlay">
        <div class="modal" style="border:1px solid #2a2d31;">
          <div class="mtitle">YOUR PROFILE</div>
          <div class="mbody" style="margin-bottom:14px;">Set a name, icon, and color — this is how you'll show up on the leaderboard.</div>
          <input id="profile-name-input" type="text" maxlength="16" placeholder="Enter your name"
            value="${esc(dp.name)}"
            style="width:100%;padding:10px 12px;border-radius:6px;border:1px solid #3a3d42;background:#0d0e10;color:#e8e6e1;font-family:inherit;font-size:14px;margin-bottom:14px;box-sizing:border-box;" />
          <div style="font-size:11px;color:#6b6f76;margin-bottom:6px;letter-spacing:0.05em;">ICON</div>
          <div style="display:flex;flex-wrap:wrap;gap:8px;margin-bottom:14px;">
            ${icons.map(ic => `<button onclick="window.__forge.pickIcon('${ic}')" style="display:flex;align-items:center;justify-content:center;width:38px;height:38px;border-radius:6px;border:1.5px solid ${dp.icon===ic?dp.color:'#3a3d42'};background:${dp.icon===ic?dp.color+'22':'#15171a'};cursor:pointer;">${profileIconSvg(ic, dp.icon===ic?dp.color:'#8a8f98', 18)}</button>`).join('')}
          </div>
          <div style="font-size:11px;color:#6b6f76;margin-bottom:6px;letter-spacing:0.05em;">COLOR</div>
          <div style="display:flex;flex-wrap:wrap;gap:8px;margin-bottom:18px;">
            ${colors.map(c => `<button onclick="window.__forge.pickColor('${c}')" style="width:30px;height:30px;border-radius:50%;border:2px solid ${dp.color===c?'#f2efe9':'transparent'};background:${c};cursor:pointer;"></button>`).join('')}
          </div>
          <div class="mrow">
            <button class="cancel" onclick="window.__forge.closeProfile()">CANCEL</button>
            <button class="confirm-green" onclick="window.__forge.saveProfile()">SAVE</button>
          </div>
        </div>
      </div>`;
  }
}

// ===================== PUBLIC API =====================
window.__forge = {
  toggleMain: (day, idx) => {
    const w = currentWorkouts().find(w => w.day === day);
    toggleMain(day, idx, w.exercises[idx]);
  },
  toggleSide: (skillKey, idx) => {
    const quests = lastRenderedSideQuests || currentSideQuests();
    const quest = quests[skillKey];
    if (!quest || !quest.exercises[idx]) return; // stale click after data shifted underneath it — just ignore safely
    toggleSide(skillKey, idx, quest.exercises[idx]);
  },
  toggleSideQuests: () => { sideQuestsOpen = !sideQuestsOpen; render(); },
  openEndWeekModal: () => {
    pendingModal = (state.lastEndWeekDate === todayDateString()) ? 'endweek-limited' : 'endweek';
    render();
  },
  openResetModal: () => { pendingModal = 'reset'; render(); },
  closeModal: () => { pendingModal = null; render(); },
  confirmEndWeek: confirmEndWeek,
  confirmReset: confirmResetAll,
  openProfile: () => {
    draftProfile = { ...state.profile };
    showProfileModal = true;
    render();
  },
  closeProfile: () => {
    showProfileModal = false;
    draftProfile = null;
    render();
  },
  pickIcon: (icon) => {
    const input = document.getElementById('profile-name-input');
    if (input) draftProfile.name = input.value;
    draftProfile.icon = icon;
    render();
  },
  pickColor: (color) => {
    const input = document.getElementById('profile-name-input');
    if (input) draftProfile.name = input.value;
    draftProfile.color = color;
    render();
  },
  saveProfile: () => {
    const input = document.getElementById('profile-name-input');
    const name = input ? input.value.trim().slice(0, 16) : draftProfile.name;
    state.profile = { ...draftProfile, name };
    showProfileModal = false;
    draftProfile = null;
    persist();
  },
  openAchievements: () => { achievementsOpen = true; leaderboardOpen = false; render(); },
  closeAchievements: () => { achievementsOpen = false; render(); },
  toggleAchievements: () => { achievementsOpen = !achievementsOpen; if (achievementsOpen) leaderboardOpen = false; render(); },
  openLeaderboard: () => { leaderboardOpen = true; achievementsOpen = false; render(); },
  closeLeaderboard: () => { leaderboardOpen = false; render(); },
  toggleLeaderboard: () => {
    leaderboardOpen = !leaderboardOpen;
    if (leaderboardOpen) { achievementsOpen = false; }
    render();
  },
  saveSyncKey: () => {
    const input = document.getElementById('sync-key-input');
    if (!input || !input.value.trim()) return;
    const key = sanitizeKey(input.value);
    setSyncKey(key);
    pushFullState();
    startOwnRecordSync(key);
    render();
  },
  openLoadKey: () => { pendingModal = 'loadkey'; render(); },
  toggleSyncKeyReveal: () => { syncKeyRevealed = !syncKeyRevealed; render(); },
  openExercisePicker: (skillKey) => {
    exercisePickerSkill = skillKey;
    exercisePickerSelected = null;
    exercisePickerCustomName = '';
    slotEditTarget = null;
    pendingModal = 'exercisepicker';
    render();
  },
  openExerciseSlotEdit: (dayNum, idx) => {
    const day = currentWorkouts().find(d => d.day === dayNum);
    if (!day) return;
    const ex = day.exercises[idx];
    slotEditTarget = { day: dayNum, idx };
    exercisePickerSkill = ex.skill || day.skill;
    exercisePickerSelected = null;
    exercisePickerCustomName = '';
    pendingModal = 'exercisepicker';
    render();
  },
  confirmSlotEdit: () => {
    const sel = exercisePickerSelected;
    if (!sel || !slotEditTarget) return;
    const isCustom = sel === 'custom';
    const nameInput = document.getElementById('picker-custom-name');
    const amountInput = document.getElementById('picker-amount-input');
    const name = isCustom ? (nameInput ? nameInput.value.trim() : exercisePickerCustomName.trim()) : sel.name;
    if (isCustom && !name) return;
    const amount = amountInput ? parseInt(amountInput.value, 10) || 1 : sel.reps;
    const unit = isCustom ? 'rep' : sel.unit;
    const diff = isCustom ? (lookupExerciseLibrary(name) !== null ? lookupExerciseLibrary(name) : estimateCustomDifficulty(name)) : sel.diff;
    const skillKey = exercisePickerSkill;

    if (!state.myWeek) state.myWeek = seedDefaultWeek();
    const dayIdx = state.myWeek.findIndex(d => d.day === slotEditTarget.day);
    if (dayIdx === -1) return;
    const repsLabel = unit === 'sec' ? amount + ' sec' : String(amount);
    state.myWeek[dayIdx].exercises[slotEditTarget.idx] = {
      name, sets: 3, repsLabel, reps: amount, unit, diff, skill: skillKey,
    };

    pendingModal = null;
    slotEditTarget = null;
    exercisePickerSkill = null;
    exercisePickerSelected = null;
    exercisePickerCustomName = '';
    if (allSkillsAtZero()) recalculateSideQuestSkills();
    persist();
    showPopup('Exercise updated', SKILL_COLOR[skillKey]);
  },
  selectPickerExercise: (idx) => {
    const exercises = allExercisesForSkill(exercisePickerSkill);
    exercisePickerSelected = exercises[idx];
    render();
  },
  selectPickerCustom: () => {
    exercisePickerSelected = 'custom';
    render();
  },
  updatePickerCustomName: (val) => {
    exercisePickerCustomName = val;
    render();
    // restore focus + cursor position since render() rebuilds the input fresh
    const input = document.getElementById('picker-custom-name');
    if (input) {
      input.focus();
      const len = input.value.length;
      input.setSelectionRange(len, len);
    }
  },
  updateGlobalSearch: (val) => {
    globalSearchQuery = val;
    render();
    const input = document.getElementById('global-search-input');
    if (input) {
      input.focus();
      const len = input.value.length;
      input.setSelectionRange(len, len);
    }
  },
  selectGlobalResult: (name) => {
    const entry = EXERCISE_LIBRARY.find(([n]) => n === name);
    if (!entry) return;
    const skill = EXERCISE_LIBRARY_SKILL_MAP[name];
    if (!skill) return;
    globalSearchSelected = { name: entry[0], diff: entry[1], skill };
    pendingModal = 'globalconfirm';
    globalSearchQuery = '';
    render();
  },
  updateGlobalConfirmPreview: () => {
    const amountInput = document.getElementById('global-amount-input');
    const previewSpan = document.getElementById('global-xp-preview');
    if (!amountInput || !previewSpan || !globalSearchSelected) return;
    const amount = parseInt(amountInput.value, 10) || 1;
    previewSpan.textContent = '+' + xpForExercise({ reps: amount, unit: 'rep', diff: globalSearchSelected.diff }) + ' xp';
  },
  confirmGlobalLog: () => {
    const sel = globalSearchSelected;
    if (!sel) return;
    const amountInput = document.getElementById('global-amount-input');
    const amount = amountInput ? parseInt(amountInput.value, 10) || 1 : 10;
    const ex = { name: sel.name, reps: amount, unit: 'rep', diff: sel.diff };
    const gained = xpForExercise(ex);

    const skillKey = sel.skill;
    const isSideSkill = isSideSkillFixed(skillKey);
    const pool = isSideSkill ? state.sideXp : state.xpData;
    const prevXp = pool[skillKey] || 0;
    const prevLevel = getLevel(prevXp);
    pool[skillKey] = prevXp + gained;
    const newLevel = getLevel(pool[skillKey]);

    pendingModal = null;
    globalSearchSelected = null;
    if (allSkillsAtZero()) recalculateSideQuestSkills();
    persist();
    showPopup('+' + gained + ' ' + skillKey + ' XP', SKILL_COLOR[skillKey]);
    if (newLevel > prevLevel) showLevelFlash(skillKey, newLevel);
  },
  pickSuggestion: (name) => {
    exercisePickerCustomName = name;
    render();
  },
  updatePickerPreview: () => {
    const amountInput = document.getElementById('picker-amount-input');
    const previewSpan = document.getElementById('picker-xp-preview');
    if (!amountInput || !previewSpan) return;
    const sel = exercisePickerSelected;
    if (!sel) return;
    const isCustom = sel === 'custom';
    const amount = parseInt(amountInput.value, 10) || 1;
    const unit = isCustom ? 'rep' : sel.unit;
    const diff = isCustom ? estimateCustomDifficulty(exercisePickerCustomName) : sel.diff;
    previewSpan.textContent = '+' + xpForExercise({ reps: amount, unit, diff }) + ' xp';
  },
  confirmPickerLog: () => {
    const sel = exercisePickerSelected;
    if (!sel) return;
    const isCustom = sel === 'custom';
    const nameInput = document.getElementById('picker-custom-name');
    const amountInput = document.getElementById('picker-amount-input');
    const name = isCustom ? (nameInput ? nameInput.value.trim() : exercisePickerCustomName.trim()) : sel.name;
    if (isCustom && !name) return;
    const amount = amountInput ? parseInt(amountInput.value, 10) || 1 : sel.reps;
    const diff = isCustom ? (lookupExerciseLibrary(name) !== null ? lookupExerciseLibrary(name) : estimateCustomDifficulty(name)) : sel.diff;
    const unit = isCustom ? 'rep' : sel.unit;
    const ex = { name, reps: amount, unit, diff };
    const gained = xpForExercise(ex);

    const skillKey = exercisePickerSkill;
    const isSideSkill = isSideSkillFixed(skillKey);
    const pool = isSideSkill ? state.sideXp : state.xpData;
    const prevXp = pool[skillKey] || 0;
    const prevLevel = getLevel(prevXp);
    pool[skillKey] = prevXp + gained;
    const newLevel = getLevel(pool[skillKey]);

    pendingModal = null;
    exercisePickerSkill = null;
    exercisePickerSelected = null;
    exercisePickerCustomName = '';
    persist();
    showPopup('+' + gained + ' ' + skillKey + ' XP', SKILL_COLOR[skillKey]);
    if (newLevel > prevLevel) showLevelFlash(skillKey, newLevel);
  },
  openDaySwap: (dayNum) => {
    daySwapTarget = dayNum;
    pendingModal = 'dayswap';
    render();
  },
  confirmDaySwap: (newSkill) => {
    const dayNum = daySwapTarget;
    if (!dayNum) return;
    const pool = allExercisesForSkill(newSkill);
    if (pool.length === 0) { showPopup('No exercises found for that skill', '#ff5050'); return; }
    if (!state.myWeek) state.myWeek = seedDefaultWeek();
    // count how many OTHER days already use this skill, so repeats get a
    // different slice of the pool instead of identical exercises every time
    const otherDaysWithSkill = state.myWeek.filter(d => d.day !== dayNum && d.skill === newSkill).length;
    const offset = (otherDaysWithSkill * 3) % pool.length;
    const chosen = [];
    for (let i = 0; i < Math.min(3, pool.length); i++) {
      chosen.push(pool[(offset + i) % pool.length]);
    }
    const dayIdx = state.myWeek.findIndex(d => d.day === dayNum);
    if (dayIdx === -1) return;
    state.myWeek[dayIdx] = {
      day: dayNum,
      skill: newSkill,
      skill2: undefined,
      sub: 'Custom Focus',
      exercises: chosen.map(ex => ({ ...ex, skill: newSkill })),
      rest: 'Rest 30 sec between sets',
    };
    // if this day WAS the rest day, the week now has no rest day at all —
    // move rest to any OTHER day so there's always exactly one, picking the
    // lowest-numbered day that isn't this one (simple and predictable)
    if (state.restDay === dayNum) {
      const candidates = [1,2,3,4,5,6,7].filter(d => d !== dayNum);
      state.restDay = candidates[0];
    }
    pendingModal = null;
    daySwapTarget = null;
    if (allSkillsAtZero()) recalculateSideQuestSkills();
    persist();
    showPopup('Day ' + dayNum + ' now focuses on ' + newSkill, SKILL_COLOR[newSkill]);
  },
  confirmRestSwap: () => {
    const dayNum = daySwapTarget;
    if (!dayNum) return;
    if (!state.myWeek) state.myWeek = seedDefaultWeek();
    const oldRestDay = state.restDay;
    state.restDay = dayNum;
    // the day that WAS rest needs a real focus now — default it to Full Body
    // until the user customizes it themselves, same fallback as elsewhere
    if (oldRestDay !== dayNum) {
      const oldDayIdx = state.myWeek.findIndex(d => d.day === oldRestDay);
      if (oldDayIdx !== -1 && state.myWeek[oldDayIdx].skill === 'REST') {
        const pool = allExercisesForSkill('FULLBODY').slice(0, 3);
        state.myWeek[oldDayIdx] = {
          day: oldRestDay, skill: 'FULLBODY', sub: 'Custom Focus',
          exercises: pool.map(ex => ({ ...ex, skill: 'FULLBODY' })),
          rest: 'Rest 30 sec between sets',
        };
      }
    }
    pendingModal = null;
    daySwapTarget = null;
    if (allSkillsAtZero()) recalculateSideQuestSkills();
    persist();
    showPopup('Day ' + dayNum + ' is now your rest day', '#8a8f98');
  },
  confirmLoadKey: () => {
    const input = document.getElementById('load-key-input');
    if (!input || !input.value.trim()) return;
    const key = sanitizeKey(input.value);
    const oldKey = getSyncKey();
    if (oldKey && oldKey !== key) {
      try { db.ref('users/' + oldKey).off(); } catch (e) { console.error('Detach old listener failed:', e); }
    }
    setSyncKey(key);
    pendingModal = null;
    render();
    db.ref('users/' + key).once('value').then(snap => {
      const data = snap.val();
      if (data) {
        // adopt the remote state wholesale, but keep using the same key
        const { totalLevel, totalXp, updatedAt, ...restoredState } = data;
        state = Object.assign({
          completed: {}, xpData: { CHEST:0, BACK:0, ABS:0, SHOULDERS:0 },
          sideCompleted: {}, sideXp: { LEGS:0, ARMS:0, CARDIO:0, FULLBODY:0 },
          myWeek: null, restDay: 7, sideQuestSkills: null,
          profile: { name:'', color:'#c4451c', icon:'FLAME' },
          lastEndWeekDate: null,
        }, restoredState);
        if (!state.completed || typeof state.completed !== 'object') state.completed = {};
        if (!state.sideCompleted || typeof state.sideCompleted !== 'object') state.sideCompleted = {};
        if (!state.profile || typeof state.profile !== 'object') state.profile = { name:'', color:'#c4451c', icon:'FLAME' };
        repairMisplacedSkillXp();
        try { localStorage.setItem('forge-state', JSON.stringify(state)); } catch (e) {}
        showPopup('Loaded ' + (state.profile.name || key) + ' — full progress restored', '#4ea876');
      } else {
        showPopup('No data found for that key yet — starting fresh under it', '#e8703a');
      }
      render();
    }).catch(err => {
      console.error('Load key failed:', err);
      showPopup('LOAD FAILED: ' + (err.message || err.code || 'unknown error'), '#ff5050');
    }).finally(() => {
      // only attach the live listener AFTER the one-time pull is fully done,
      // so the two don't race to render/update state at the same moment
      startOwnRecordSync(key);
    });
  },
};

// ===================== INIT =====================
tryLocalRestore();
render();
appStarted = true;
const existingSyncKey = getSyncKey();
if (existingSyncKey) startOwnRecordSync(existingSyncKey);
</script>
</body>
</html>
