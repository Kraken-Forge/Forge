    el.style.whiteSpace = 'pre-wrap';

// ===================== XP / LEVEL MATH (RuneScape-style curve) =====================
function xpForLevel(level) {
  let points = 0;
  for (let n = 1; n < level; n++) points += Math.floor(n + 300 * Math.pow(2, n / 7));
  const raw = Math.floor(points / 4);
  const raw99 = 13034431; // raw XP for level 99, precomputed constant
  const target99 = 43820; // ~2.7 years at typical weekly pace
  if (raw === 0) return 0;
  return Math.round(target99 * Math.pow(raw / raw99, 0.5));
}
const LEVEL_TABLE = (() => {
  const t = [0];
  for (let lvl = 1; lvl <= 99; lvl++) t.push(xpForLevel(lvl + 1));
  return t;
})();
function getLevel(xp) {
  let lvl = 1;
  for (let i = 1; i <= 99; i++) { if (xp >= LEVEL_TABLE[i]) lvl = i + 1; else break; }
  return Math.min(lvl, 99);
}
function xpProgress(xp) {
  const level = getLevel(xp);
  if (level >= 99) return { level, pct: 100 };
  const floor = LEVEL_TABLE[level - 1], ceil = LEVEL_TABLE[level];
  return { level, pct: ((xp - floor) / (ceil - floor)) * 100 };
}
function xpForExercise(ex) {
  if (ex.diff === 0) return 0;
  const base = ex.unit === 'sec' ? ex.reps * 0.8 : ex.reps * 1.6;
  return Math.round(base * ex.diff);
}

// ===================== ACHIEVEMENTS STAR MAP =====================
// A pure night-sky constellation chart, the way real star charts work —
// each skill's stars connect in a path that loosely traces that body part's
// shape, the way Orion traces a hunter. No icons, no badges, no cape object.
// This is meant to feel like a different visual world from the rest of the
// app for a moment, not like another themed panel.
// Each constellation is defined in a small local 60x60 coordinate space,
// then tiled into a clean 4-column x 2-row grid — compact, no longer
// sprawling into a full figure.
const CONSTELLATIONS = {
  CHEST: {
    // shield/apple shape: smooth rounded top, bulging at the shoulders,
    // flat-ish bottom with a slight upward lift at center, no downward point
    stars: [[30,6],[44,10],[50,24],[42,40],[30,36],[18,40],[10,24],[16,10]],
    chain: [0,1,2,3,4,5,6,7,0],
  },
  BACK: {
    // wide at the shoulders, flat bottom — no downward point at all
    stars: [[30,6],[10,18],[8,30],[18,48],[30,48],[42,48],[52,30],[50,18]],
    chain: [0,1,2,3,4,5,6,7,0],
  },
  SHOULDERS: {
    // two small deltoid arcs as one broken shape
    stars: [[8,30],[16,20],[26,24],[34,24],[44,20],[52,30]],
    chain: [0,1,2,null,3,4,5],
  },
  ABS: {
    // segmented core, ladder-like
    stars: [[20,6],[40,6],[18,22],[42,22],[20,38],[40,38],[22,54],[38,54]],
    chain: [0,1,null,2,3,null,4,5,null,6,7],
  },
  LEGS: {
    // forked from a hip block down to two feet — order interleaves left/right
    // so both legs fill in sync rather than one leg completing before the other
    stars: [[22,6],[38,6],[20,26],[40,26],[14,46],[46,46],[10,58],[50,58]],
    chain: [0,1,null,0,2,4,6,null,1,3,5,7],
  },
  ARMS: {
    // bicep bulge as a 5-point loop, with the forearm rising as 2 more
    // points from the top of the loop up toward the fist — matches the
    // real arms icon's flexed-curve-plus-fist shape
    stars: [[28,26],[39,34],[35,48],[21,48],[17,34],[30,14],[32,4]],
    chain: [0,1,2,3,4,0,null,0,5,6],
  },
  CARDIO: {
    // zigzag heartbeat pulse line
    stars: [[4,30],[16,30],[22,14],[30,46],[38,18],[44,30],[56,30]],
    chain: [0,1,2,3,4,5,6],
  },
  FULLBODY: {
    // trunk first (head, neck, hip), then each limb branches individually
    // from its joint — hands from the neck, feet from the hip — alternating
    // left-right-left-right rather than connecting straight across to its mirror
    stars: [[30,4],[30,16],[30,30],[18,12],[42,12],[16,52],[44,52]],
    chain: [0,1,2,null,1,3,null,1,4,null,2,5,null,2,6],
  },
};
const STARS_PER_ZONE_MAX = 9; // ceiling used for lighting math, actual star count varies per constellation

// Uses the same skill colors as the rest of the app, no separate palette —
// avoids confusion between what a skill's color means here vs everywhere else.
const CONSTELLATION_AURORA = SKILL_COLOR;

function capeIsMaxed(xpData, sideXp) {
  const all = { ...xpData, ...sideXp };
  return Object.values(all).every(xp => getLevel(xp) >= 99);
}

function renderConstellationMap(xpData, sideXp) {
  const allXp = { ...xpData, ...sideXp };
  const maxed = capeIsMaxed(xpData, sideXp);

  // 4 columns x 2 rows grid, each cell 70x70
  const CELL = 70;
  const COLS = 4;
  const gridOrder = ['CHEST','BACK','SHOULDERS','ABS','LEGS','ARMS','CARDIO','FULLBODY'];
  const W = CELL * COLS;
  const H = CELL * 2;

  let svg = `<svg width="100%" height="auto" viewBox="0 0 ${W} ${H}" style="display:block;max-width:320px;">
    <defs>
      <radialGradient id="skyGrad" cx="50%" cy="30%" r="95%">
        <stop offset="0%" stop-color="${maxed ? '#181206' : '#10111c'}" />
        <stop offset="100%" stop-color="${maxed ? '#0c0904' : '#050509'}" />
      </radialGradient>
      <radialGradient id="nebA" cx="50%" cy="50%" r="50%"><stop offset="0%" stop-color="#e860b0" stop-opacity="0.12" /><stop offset="100%" stop-color="#e860b0" stop-opacity="0" /></radialGradient>
      <radialGradient id="nebB" cx="50%" cy="50%" r="50%"><stop offset="0%" stop-color="#3fd9d0" stop-opacity="0.11" /><stop offset="100%" stop-color="#3fd9d0" stop-opacity="0" /></radialGradient>
    </defs>
    <rect x="0" y="0" width="${W}" height="${H}" fill="url(#skyGrad)" />`;

  svg += `<ellipse cx="${W*0.25}" cy="${H*0.3}" rx="${W*0.3}" ry="${H*0.5}" fill="url(#nebA)" />`;
  svg += `<ellipse cx="${W*0.75}" cy="${H*0.7}" rx="${W*0.3}" ry="${H*0.5}" fill="url(#nebB)" />`;

  // sparse scattered background micro-stars, scaled to the smaller canvas
  const bgSeed = [5,8,18,15,32,6,48,18,62,9,8,32,25,38,40,30,55,40,70,35,12,55,28,58,
    42,50,58,55,72,48,18,62,35,65,50,60,65,68,8,68,22,68];
  for (let i = 0; i < bgSeed.length; i += 2) {
    const x = bgSeed[i] * (W / 75);
    const y = bgSeed[i+1] * (H / 70);
    svg += `<circle cx="${x.toFixed(1)}" cy="${Math.min(y,H-2).toFixed(1)}" r="0.6" fill="#aab8ff" opacity="0.4" />`;
  }

  gridOrder.forEach((skill, gridIdx) => {
    const con = CONSTELLATIONS[skill];
    const col = gridIdx % COLS;
    const row = Math.floor(gridIdx / COLS);
    const offX = col * CELL;
    const offY = row * CELL;

    const xp = allXp[skill] || 0;
    const level = getLevel(xp);
    const total = con.stars.length;
    const litCount = level > 0 ? Math.min(total, Math.max(1, Math.round((level / 99) * total))) : 0;
    const color = CONSTELLATION_AURORA[skill];

    // subtle cell divider, very faint, just to suggest grid structure
    if (col > 0) svg += `<line x1="${offX}" y1="${offY+4}" x2="${offX}" y2="${offY+CELL-4}" stroke="#1c1d2c" stroke-width="0.5" opacity="0.5" />`;

    let segStart = null;
    con.chain.forEach((idx) => {
      if (idx === null) { segStart = null; return; }
      if (segStart !== null) {
        const bothLit = segStart < litCount && idx < litCount;
        const [x1,y1] = con.stars[segStart];
        const [x2,y2] = con.stars[idx];
        svg += `<line x1="${x1+offX}" y1="${y1+offY}" x2="${x2+offX}" y2="${y2+offY}"
          stroke="${bothLit ? color : '#6a6d7e'}" stroke-width="${bothLit ? 0.9 : 0.55}" opacity="${bothLit ? 0.6 : 0.4}" />`;
      }
      segStart = idx;
    });

    con.stars.forEach(([x,y], i) => {
      const isLit = i < litCount;
      const cx = x + offX, cy = y + offY;
      if (isLit) {
        // colored fill with a soft bloom, white outline still visible underneath
        svg += `<circle cx="${cx}" cy="${cy}" r="2.1" fill="${color}" stroke="#f2f2f5" stroke-width="0.4" class="star-anim" style="filter:drop-shadow(0 0 4px ${color}) drop-shadow(0 0 7px ${color}88);" />`;
      } else {
        // unlit: clean white outline only, no fill, so the constellation shape always reads clearly
        svg += `<circle cx="${cx}" cy="${cy}" r="1.6" fill="none" stroke="#e8e8ee" stroke-width="0.7" opacity="0.65" />`;
      }
    });
  });

  svg += `</svg>`;
  return svg;
}

// A simple passphrase is the "account" — typing the same phrase on any
// device loads that person's data. Stored locally once set.
function getSyncKey() {
  try { return localStorage.getItem('forge-sync-key') || null; } catch (e) { return null; }
}
function setSyncKey(key) {
  try { localStorage.setItem('forge-sync-key', key); } catch (e) {}
}
function sanitizeKey(raw) {
  // Firebase keys can't contain . $ # [ ] / or whitespace
  return raw.trim().replace(/[.$#\[\]\/\s]/g, '_').slice(0, 40);
}

// Pushes this device's current totals + profile to Firebase under the
// person's sync key. Only called on End Week, per the daily-cap design.
// Pushes this device's ENTIRE state to Firebase under the person's sync
// key, so opening Forge on any other device with the same key restores
// everything — not just a leaderboard summary. Runs on every local save.
let syncInFlight = false;
function pushFullState() {
  const key = getSyncKey();
  if (!key) return; // no sync key set — purely local, nothing to push
  if (syncInFlight) return; // avoid stacking redundant writes
  syncInFlight = true;
  const totalLevel = Object.values(state.xpData).reduce((s,x)=>s+getLevel(x),0) +
                      Object.values(state.sideXp).reduce((s,x)=>s+getLevel(x),0);
  const totalXp = Object.values(state.xpData).reduce((s,x)=>s+x,0) +
                   Object.values(state.sideXp).reduce((s,x)=>s+x,0);
  const payload = {
    ...state,
    totalLevel,
    totalXp,
    updatedAt: Date.now(),
  };
  db.ref('users/' + key).set(payload)
    .catch(err => console.error('Sync failed:', err))
    .finally(() => { syncInFlight = false; });
}

// Pulls another device's full state down and adopts it as this device's
// local state — used when switching/loading a different sync key.
function pullFullState(key) {
  return db.ref('users/' + key).once('value').then(snap => snap.val());
}

function tryLocalRestore() {
  try {
    const raw = localStorage.getItem('forge-state');
    if (raw) {
      const parsed = JSON.parse(raw);
      state = Object.assign(state, parsed);
      // Reversal: an earlier version briefly scaled XP up 320x to stretch the
      // timeline to 99. That's reverted now (curve shrunk instead), so undo
      // that scale-up for anyone who has it, back to normal small numbers.
      if (parsed.xpFormulaV2) {
        const SCALE = 320;
        for (const k of Object.keys(state.xpData)) state.xpData[k] = Math.round((state.xpData[k] || 0) / SCALE);
        for (const k of Object.keys(state.sideXp)) state.sideXp[k] = Math.round((state.sideXp[k] || 0) / SCALE);
        delete state.xpFormulaV2;
        persist();
      }
    }
  } catch (e) {}
}

// ===================== POPUPS / LEVEL BANNER =====================
// These render into a separate overlay layer, inserted exactly once per
// occurrence and left alone until their own timeout removes them — never
// re-created by the main render() loop, which is what caused the restart glitch.
function showPopup(text, color) {
  const id = 'popup-' + Date.now() + '-' + Math.random().toString(36).slice(2);
  const layer = document.getElementById('overlay-layer');
  const existingCount = layer.querySelectorAll('.xp-popup').length;
  const el = document.createElement('div');
  el.id = id;
  el.className = 'xp-popup anim';
  el.style.color = color;
  el.style.textShadow = `0 0 8px ${color}99`;
  el.style.top = (70 + existingCount * 26) + 'px';
  el.textContent = text;
  layer.appendChild(el);
  setTimeout(() => { const e = document.getElementById(id); if (e) e.remove(); }, 1800);
}

function showLevelFlash(skill, level) {
  const id = 'levelflash-' + Date.now() + '-' + Math.random().toString(36).slice(2);
  const layer = document.getElementById('overlay-layer');
  const color = SKILL_COLOR[skill] || '#c4451c';
  const el = document.createElement('div');
  el.id = id;
  el.className = 'levelbanner anim';
  el.style.background = `linear-gradient(90deg,${color},#f2c14e)`;
  el.style.boxShadow = `0 0 20px ${color}99`;
  el.innerHTML = `<span style="color:#0d0e10;font-weight:900;font-size:13px;letter-spacing:0.03em;">✨ ${skill} LEVEL UP — ${level}</span>`;
  layer.appendChild(el);
  setTimeout(() => { const e = document.getElementById(id); if (e) e.remove(); }, 2200);
}

// ===================== TOGGLE LOGIC =====================
function toggleMain(day, idx, ex) {
  const key = day + '-' + idx;
  const wasDone = !!state.completed[key];
  state.completed[key] = !wasDone;
  const w = currentWorkouts().find(w => w.day === day);
  const skillKey = ex.skill || w.skill;
  if (skillKey !== 'REST') {
    const gained = xpForExercise(ex);
    const prevXp = state.xpData[skillKey] || 0;
    const prevLevel = getLevel(prevXp);
    if (!wasDone) {
      state.xpData[skillKey] = prevXp + gained;
      const newLevel = getLevel(state.xpData[skillKey]);
      showPopup('+' + gained + ' ' + skillKey + ' XP', SKILL_COLOR[skillKey]);
      if (newLevel > prevLevel) showLevelFlash(skillKey, newLevel);
    } else {
      state.xpData[skillKey] = Math.max(0, prevXp - gained);
    }
  }
  persist();
}

function toggleSide(skillKey, idx, ex) {
  const key = skillKey + '-' + idx;
  const wasDone = !!state.sideCompleted[key];
  state.sideCompleted[key] = !wasDone;
  const gained = xpForExercise(ex);
  const prevXp = state.sideXp[skillKey] || 0;
  const prevLevel = getLevel(prevXp);
  if (!wasDone) {
    state.sideXp[skillKey] = prevXp + gained;
    const newLevel = getLevel(state.sideXp[skillKey]);
    showPopup('+' + gained + ' ' + currentSideQuests()[skillKey].label + ' XP', SKILL_COLOR[skillKey]);
    if (newLevel > prevLevel) showLevelFlash(currentSideQuests()[skillKey].label, newLevel);
  } else {
    state.sideXp[skillKey] = Math.max(0, prevXp - gained);
  }
  persist();
}

function dayProgress(day, exCount) {
  let done = 0;
  for (let i = 0; i < exCount; i++) if (state.completed[day + '-' + i]) done++;
  return done;
}

function todayDateString() {
  const d = new Date();
  return d.getFullYear() + '-' + (d.getMonth()+1) + '-' + d.getDate();
}

function confirmEndWeek() {
  state.completed = {};
  state.sideCompleted = {};
  state.rotationIndex = (state.rotationIndex + 1) % WORKOUT_ROTATIONS.length;
  state.lastEndWeekDate = todayDateString();
  pendingModal = null;
  persist();
  showPopup('WEEK CASHED IN — XP BANKED', '#f2c14e');
}

function confirmResetAll() {
  state = {
    completed: {},
    xpData: { CHEST:0, BACK:0, ABS:0, SHOULDERS:0 },
    sideCompleted: {},
    sideXp: { LEGS:0, ARMS:0, CARDIO:0, FULLBODY:0 },
    rotationIndex: 0,
    profile: { name: '', color: '#c4451c', icon: 'FLAME' },
    lastEndWeekDate: null,
  };
  pendingModal = null;
  persist();
}

  html += renderSkillBar('BACK', state.xpData.BACK, 'BACK');
  html += renderSkillBar('SHOULDERS', state.xpData.SHOULDERS, 'SHOULDERS');
  html += renderSkillBar('ABS', state.xpData.ABS, 'ABS');
  html += renderSkillBar('LEGS', state.sideXp.LEGS, 'LEGS');
  html += renderSkillBar('ARMS', state.sideXp.ARMS, 'ARMS');
  html += renderSkillBar('CARDIO', state.sideXp.CARDIO, 'CARDIO');
  html += renderSkillBar('FULLBODY', state.sideXp.FULLBODY, 'FULL BODY');
  html += `</div>`;

  currentWorkouts().forEach(w => {
    const done = dayProgress(w.day, w.exercises.length);
    const isFull = done === w.exercises.length;
    const color = SKILL_COLOR[w.skill];
    html += `<div class="day" style="border-color:${isFull ? color : '#232629'};opacity:${w.skill==='REST'?0.85:1}">
      <div class="dayhead" style="background:${isFull ? color+'14' : 'transparent'}">
        <div>
          <span class="daynum">DAY ${w.day}</span>
          <div class="titles">
            <span class="focus" style="color:${color}">${skillIconSvg(w.skill, color, 17)} ${w.skill}${w.skill2 ? ' / ' + w.skill2 : ''}</span>
            <span class="sub">${w.sub}</span>
          </div>
        </div>
      </div>
      <div>`;
    w.exercises.forEach((ex, idx) => {
      const key = w.day + '-' + idx;
      const isDone = !!state.completed[key];
      const exColor = SKILL_COLOR[ex.skill || w.skill];
      html += renderExRow(key, ex, isDone, exColor, `onclick="window.__forge.toggleMain(${w.day},${idx})"`);
    });
    html += `</div><div class="rest">${w.rest}</div></div>`;
  });

  html += `<p class="footer-tip">HARDER VARIATIONS = MORE XP/SET. LEVEL UP EACH SKILL TO 99.</p>`;

  html += `<div class="sidequests">
    <div class="sqhead" onclick="window.__forge.toggleSideQuests()">
      <div><div class="title">${sideQuestIconSvg('#d8a23a', 16)} SIDE QUESTS</div><div class="desc">Optional — Legs, Arms, Cardio, Full Body</div></div>
      <span class="chevron" style="transform:${sideQuestsOpen?'rotate(180deg)':'none'}">⌄</span>
    </div>`;
  if (sideQuestsOpen) {
    html += `<div class="sqbody">`;
    Object.entries(currentSideQuests()).forEach(([skillKey, quest]) => {
      const color = SKILL_COLOR[skillKey];
      const prog = xpProgress(state.sideXp[skillKey] || 0);
      html += `<div class="sqskill">
        <div class="sqskillhead">
          <div class="top" style="display:flex;justify-content:space-between;font-size:12px;margin-bottom:4px;">
            <span style="color:${color};font-weight:800;letter-spacing:0.04em">${skillIconSvg(skillKey, color, 14)} ${quest.label.toUpperCase()}</span>
            <span style="color:#8a8f98">Lv ${prog.level}${prog.level<99?' ('+Math.floor(prog.pct)+'%)':''}</span>
          </div>
          <div class="barbg" style="height:5px"><div class="barfg" style="width:${prog.pct}%;background:linear-gradient(90deg,${color},${color}cc)"></div></div>
        </div>
        <div>`;
      quest.exercises.forEach((ex, idx) => {
        const key = skillKey + '-' + idx;
        const isDone = !!state.sideCompleted[key];
        html += renderExRow(key, ex, isDone, color, `onclick="window.__forge.toggleSide('${skillKey}',${idx})"`);
      });
      html += `</div></div>`;
    });
    html += `<p style="font-size:10px;color:#52555a;text-align:center;margin-top:8px;font-style:italic;">Log these whenever — no day requirement, no rest timers enforced.</p></div>`;
  }
  html += `</div>`;

  html += `<button class="bigbtn endweek" onclick="window.__forge.openEndWeekModal()">End Week — Bank XP &amp; Reset Checklist</button>`;

  app.innerHTML = html;

  // Achievements tab + slide-in star map panel
  const maxed = capeIsMaxed(state.xpData, state.sideXp);
  app.innerHTML += `<div class="ach-tab ${achievementsOpen ? 'shifted' : ''}" style="${leaderboardOpen ? 'display:none;' : ''}" onclick="window.__forge.toggleAchievements()">${achievementsOpen ? '✕ CLOSE' : (maxed ? '★ ALL STARS LIT' : 'ACHIEVEMENTS')}</div>`;

  const allXpForMap = { ...state.xpData, ...state.sideXp };
  const legendOrder = ['CHEST','BACK','SHOULDERS','ABS','LEGS','ARMS','CARDIO','FULLBODY'];
  const legendLabels = { CHEST:'Chest', BACK:'Back', SHOULDERS:'Shoulders', ABS:'Abs', LEGS:'Legs', ARMS:'Arms', CARDIO:'Cardio', FULLBODY:'Full Body' };
  const legendHtml = legendOrder.map(skill => {
    const xp = allXpForMap[skill] || 0;
    const level = getLevel(xp);
    const total = CONSTELLATIONS[skill].stars.length;
    const lit = level > 0 ? Math.min(total, Math.max(1, Math.round((level / 99) * total))) : 0;
    const color = SKILL_COLOR[skill];
    return `<div class="legend-row">
      <span class="lname" style="color:${color}">${skillIconSvg(skill, color, 14)} ${legendLabels[skill]}</span>
      <span class="lstars">Lv ${level} · ${lit}/${total} ★</span>
    </div>`;
  }).join('');

  app.innerHTML += `
    <div class="ach-panel-overlay ${achievementsOpen ? 'open' : ''}" onclick="window.__forge.closeAchievements()"></div>
    <div class="ach-panel ${achievementsOpen ? 'open' : ''}">
      <h2 class="ach-title" style="margin-bottom:4px;color:#c9a227;">Star Map</h2>
      <div class="ach-sub">${maxed ? 'Every constellation complete — all 8 skills at level 99.' : 'Each skill traces its own constellation as it levels.'}</div>
      ${maxed ? `<div class="maxcape-banner">✦ ALL CONSTELLATIONS COMPLETE ✦</div>` : ''}
      <div class="cape-stage">${renderConstellationMap(state.xpData, state.sideXp)}</div>
      <div class="legend">${legendHtml}</div>
    </div>`;

  // Leaderboard tab + slide-in panel (left edge) — pulls real synced data
  // from Firebase, refreshed by pushing this device's own numbers whenever
  // the panel is opened (see toggleLeaderboard/openLeaderboard).
  const myTotalLevel = Object.values(state.xpData).reduce((s,x)=>s+getLevel(x),0) +
                        Object.values(state.sideXp).reduce((s,x)=>s+getLevel(x),0);
  const myTotalXp = Object.values(state.xpData).reduce((s,x)=>s+x,0) +
                     Object.values(state.sideXp).reduce((s,x)=>s+x,0);
  const hasName = !!state.profile.name;
  const mySyncKey = getSyncKey();

  app.innerHTML += `<div class="lb-tab ${leaderboardOpen ? 'shifted' : ''}" style="${achievementsOpen ? 'display:none;' : ''}" onclick="window.__forge.toggleLeaderboard()">${leaderboardOpen ? '✕ CLOSE' : 'LEADERBOARD'}</div>`;

  const entries = Object.entries(leaderboardData)
    .map(([key, val]) => ({ key, ...val, profile: val.profile || {} }))
    .sort((a, b) => (b.totalLevel - a.totalLevel) || (b.totalXp - a.totalXp));

  const rowsHtml = entries.length ? entries.map((e, i) => {
    const isMe = mySyncKey && e.key === mySyncKey;
    const pname = e.profile.name || 'Anonymous';
    const pcolor = e.profile.color || '#8a8f98';
    const picon = e.profile.icon || 'FLAME';
    return `<div class="lb-row ${isMe ? 'me' : ''}">
      <span class="lb-rank ${i === 0 ? 'top' : ''}">${i+1}</span>
      <span style="display:flex;align-items:center;gap:6px;color:${pcolor};" class="lb-name">${profileIconSvg(picon, pcolor, 16)} ${esc(pname)}${isMe ? ' (you)' : ''}</span>
      <span class="lb-score">Lv ${e.totalLevel || 0} · ${(e.totalXp||0).toLocaleString()} xp</span>
    </div>`;
  }).join('') : `<div class="lb-empty">No one has synced yet.<br/>Set up your sync key below to appear here.</div>`;

  const syncSetupHtml = !mySyncKey ? `
    <div style="margin-top:14px;padding:14px;background:#131519;border:1px solid #2a2d31;border-radius:8px;">
      <div style="font-size:12px;color:#8a8f98;margin-bottom:10px;line-height:1.5;">
        Set a sync key once — type the same one on any device to load your data there too. Share it with friends so everyone shows up on one leaderboard.
      </div>
      <input id="sync-key-input" type="text" maxlength="40" placeholder="e.g. RedWolf42"
        style="width:100%;padding:10px 12px;border-radius:6px;border:1px solid #3a3d42;background:#0d0e10;color:#e8e6e1;font-family:inherit;font-size:14px;margin-bottom:10px;box-sizing:border-box;" />
      <button class="bigbtn" style="background:#15171a;border-color:#3a5ac4;color:#6fd8ff;" onclick="window.__forge.saveSyncKey()">SET SYNC KEY</button>
    </div>` : `
    <div style="margin-top:14px;text-align:center;font-size:11px;color:#52555a;">
      Your sync key: <span style="color:#6fd8ff;">${esc(mySyncKey)}</span>
      &nbsp;<button class="iconbtn" onclick="window.__forge.openLoadKey()" style="margin-left:6px;">Switch / Load Different Key</button>
    </div>`;

  app.innerHTML += `
    <div class="lb-panel-overlay ${leaderboardOpen ? 'open' : ''}" onclick="window.__forge.closeLeaderboard()"></div>
    <div class="lb-panel ${leaderboardOpen ? 'open' : ''}">
      <h2 class="ach-title" style="margin-bottom:4px;color:#6fd8ff;">Leaderboard</h2>
      <div class="ach-sub">Ranked by Total Level, then Total XP.</div>
      ${rowsHtml}
      ${syncSetupHtml}
      ${!hasName ? `<div style="margin-top:12px;text-align:center;"><button class="iconbtn" onclick="window.__forge.openProfile()" style="border-color:#3a5ac4;color:#6fd8ff;">Set your name to appear properly →</button></div>` : ''}
    </div>`;

  if (pendingModal === 'endweek') {
    const daysFullyDone = currentWorkouts().filter(w => w.skill !== 'REST' && dayProgress(w.day, w.exercises.length) === w.exercises.length).length;
    const nextRotation = ROTATION_NAMES[(state.rotationIndex + 1) % WORKOUT_ROTATIONS.length];
    app.innerHTML += `
      <div class="modal-overlay">
        <div class="modal danger" style="border-color:#2d6e4e;">
          <div class="mtitle">END THIS WEEK?</div>
          <div class="mbody">${daysFullyDone < 6 ? `You've fully completed ${daysFullyDone} of 6 training days. ` : 'All 6 training days complete. '}Your skill levels and XP stay locked in — only the daily checklist resets. You'll move into Rotation ${nextRotation} for a fresh set of exercises.</div>
          <div class="mrow">
            <button class="cancel" onclick="window.__forge.closeModal()">CANCEL</button>
            <button class="confirm-green" onclick="window.__forge.confirmEndWeek()">YES, END WEEK</button>
          </div>
        </div>
      </div>`;
  } else if (pendingModal === 'endweek-limited') {
    app.innerHTML += `
      <div class="modal-overlay">
        <div class="modal" style="border:1px solid #3a3d42;text-align:center;">
          <div class="mtitle">ALREADY ENDED TODAY</div>
          <div class="mbody">You've already used End Week once today. Come back tomorrow to bank another week and rotate again — this keeps XP gains realistic for the leaderboard.</div>
          <div class="mrow">
            <button class="cancel" onclick="window.__forge.closeModal()" style="flex:1;">OK</button>
          </div>
        </div>
      </div>`;
  } else if (pendingModal === 'loadkey') {
    app.innerHTML += `
      <div class="modal-overlay">
        <div class="modal" style="border:1px solid #2a2d31;">
          <div class="mtitle">LOAD A DIFFERENT KEY</div>
          <div class="mbody">Type your sync key to load that profile on this device. This overwrites your current local progress with whatever's saved under that key.</div>
          <input id="load-key-input" type="text" maxlength="40" placeholder="e.g. RedWolf42"
            style="width:100%;padding:10px 12px;border-radius:6px;border:1px solid #3a3d42;background:#0d0e10;color:#e8e6e1;font-family:inherit;font-size:14px;margin-bottom:14px;box-sizing:border-box;" />
          <div class="mrow">
            <button class="cancel" onclick="window.__forge.closeModal()">CANCEL</button>
            <button class="confirm-green" onclick="window.__forge.confirmLoadKey()">LOAD</button>
          </div>
        </div>
      </div>`;
  } else if (pendingModal === 'reset') {
    app.innerHTML += `
      <div class="modal-overlay">
        <div class="modal danger">
          <div class="mtitle">RESET EVERYTHING?</div>
          <div class="mbody">This wipes every skill back to Level 1 — Chest, Back, Shoulders, Abs, and all Side Quest skills. Today's checklist clears too.</div>
          <div class="mwarn">This can't be undone.</div>
          <div class="mrow">
            <button class="cancel" onclick="window.__forge.closeModal()">CANCEL</button>
            <button class="confirm-red" onclick="window.__forge.confirmReset()">YES, RESET ALL</button>
          </div>
        </div>
      </div>`;
  }

  if (showProfileModal) {
    const dp = draftProfile || state.profile;
    const icons = ['FLAME','BOLT','SKULL','CROWN','WOLF','EAGLE','DRAGON','STAR','GEM','TARGET','MOUNTAIN','SKULLCROSS'];
    const colors = ['#c4451c','#3a7d8c','#b08c2a','#5a8c3a','#9a4a8c','#c43a5a','#3a5ac4','#e8b923','#4ea876','#8a8f98'];
    app.innerHTML += `
      <div class="modal-overlay">
        <div class="modal" style="border:1px solid #2a2d31;">
          <div class="mtitle">YOUR PROFILE</div>
          <div class="mbody" style="margin-bottom:14px;">Set a name, icon, and color — this is how you'll show up on the leaderboard.</div>
          <input id="profile-name-input" type="text" maxlength="16" placeholder="Enter your name"
            value="${esc(dp.name)}"
            style="width:100%;padding:10px 12px;border-radius:6px;border:1px solid #3a3d42;background:#0d0e10;color:#e8e6e1;font-family:inherit;font-size:14px;margin-bottom:14px;box-sizing:border-box;" />
          <div style="font-size:11px;color:#6b6f76;margin-bottom:6px;letter-spacing:0.05em;">ICON</div>
          <div style="display:flex;flex-wrap:wrap;gap:8px;margin-bottom:14px;">
            ${icons.map(ic => `<button onclick="window.__forge.pickIcon('${ic}')" style="display:flex;align-items:center;justify-content:center;width:38px;height:38px;border-radius:6px;border:1.5px solid ${dp.icon===ic?dp.color:'#3a3d42'};background:${dp.icon===ic?dp.color+'22':'#15171a'};cursor:pointer;">${profileIconSvg(ic, dp.icon===ic?dp.color:'#8a8f98', 18)}</button>`).join('')}
          </div>
          <div style="font-size:11px;color:#6b6f76;margin-bottom:6px;letter-spacing:0.05em;">COLOR</div>
          <div style="display:flex;flex-wrap:wrap;gap:8px;margin-bottom:18px;">
            ${colors.map(c => `<button onclick="window.__forge.pickColor('${c}')" style="width:30px;height:30px;border-radius:50%;border:2px solid ${dp.color===c?'#f2efe9':'transparent'};background:${c};cursor:pointer;"></button>`).join('')}
          </div>
          <div class="mrow">
            <button class="cancel" onclick="window.__forge.closeProfile()">CANCEL</button>
            <button class="confirm-green" onclick="window.__forge.saveProfile()">SAVE</button>
          </div>
        </div>
      </div>`;
  }
}

// ===================== PUBLIC API =====================
window.__forge = {
  toggleMain: (day, idx) => {
    const w = currentWorkouts().find(w => w.day === day);
    toggleMain(day, idx, w.exercises[idx]);
  },
  toggleSide: (skillKey, idx) => {
    toggleSide(skillKey, idx, currentSideQuests()[skillKey].exercises[idx]);
  },
  toggleSideQuests: () => { sideQuestsOpen = !sideQuestsOpen; render(); },
  openEndWeekModal: () => {
    pendingModal = (state.lastEndWeekDate === todayDateString()) ? 'endweek-limited' : 'endweek';
    render();
  },
  openResetModal: () => { pendingModal = 'reset'; render(); },
  closeModal: () => { pendingModal = null; render(); },
  confirmEndWeek: confirmEndWeek,
  confirmReset: confirmResetAll,
  openProfile: () => {
    draftProfile = { ...state.profile };
    showProfileModal = true;
    render();
  },
  closeProfile: () => {
    showProfileModal = false;
    draftProfile = null;
    render();
  },
  pickIcon: (icon) => {
    const input = document.getElementById('profile-name-input');
    if (input) draftProfile.name = input.value;
    draftProfile.icon = icon;
    render();
  },
  pickColor: (color) => {
    const input = document.getElementById('profile-name-input');
    if (input) draftProfile.name = input.value;
    draftProfile.color = color;
    render();
  },
  saveProfile: () => {
    const input = document.getElementById('profile-name-input');
    const name = input ? input.value.trim().slice(0, 16) : draftProfile.name;
    state.profile = { ...draftProfile, name };
    showProfileModal = false;
    draftProfile = null;
    persist();
  },
  openAchievements: () => { achievementsOpen = true; leaderboardOpen = false; render(); },
  closeAchievements: () => { achievementsOpen = false; render(); },
  toggleAchievements: () => { achievementsOpen = !achievementsOpen; if (achievementsOpen) leaderboardOpen = false; render(); },
  openLeaderboard: () => { leaderboardOpen = true; achievementsOpen = false; render(); },
  closeLeaderboard: () => { leaderboardOpen = false; render(); },
  toggleLeaderboard: () => {
    leaderboardOpen = !leaderboardOpen;
    if (leaderboardOpen) { achievementsOpen = false; }
    render();
  },
  saveSyncKey: () => {
    const input = document.getElementById('sync-key-input');
    if (!input || !input.value.trim()) return;
    const key = sanitizeKey(input.value);
    setSyncKey(key);
    pushFullState();
    render();
  },
  openLoadKey: () => { pendingModal = 'loadkey'; render(); },
  confirmLoadKey: () => {
    const input = document.getElementById('load-key-input');
    if (!input || !input.value.trim()) return;
    const key = sanitizeKey(input.value);
    setSyncKey(key);
    pendingModal = null;
    render();
    pullFullState(key).then(data => {
      if (data) {
        // adopt the remote state wholesale, but keep using the same key
        const { totalLevel, totalXp, updatedAt, ...restoredState } = data;
        state = Object.assign({
          completed: {}, xpData: { CHEST:0, BACK:0, ABS:0, SHOULDERS:0 },
          sideCompleted: {}, sideXp: { LEGS:0, ARMS:0, CARDIO:0, FULLBODY:0 },
          rotationIndex: 0, profile: { name:'', color:'#c4451c', icon:'FLAME' },
          lastEndWeekDate: null,
        }, restoredState);
        try { localStorage.setItem('forge-state', JSON.stringify(state)); } catch (e) {}
        showPopup('Loaded ' + (state.profile.name || key) + ' — full progress restored', '#4ea876');
      } else {
        showPopup('No data found for that key yet — starting fresh under it', '#e8703a');
      }
      render();
    });
  },
};

// ===================== INIT =====================
tryLocalRestore();
render();
appStarted = true;
</script>
</body>
</html>
